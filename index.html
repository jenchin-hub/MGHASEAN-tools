<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢方南向工具包｜MGHBIO 大鬍子藥師</title>
<style>
  :root{--teal:#0F6E56;--teal-mid:#1D9E75;--teal-light:#E1F5EE;--teal-border:#9FE1CB;--text:#1a1a1a;--text-muted:#6b7280;--border:#e5e7eb;--bg:#fff;--bg-soft:#f9fafb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg-soft);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
  .hero{text-align:center;margin-bottom:2.5rem}
  .badge{display:inline-block;background:var(--teal-light);color:var(--teal);font-size:12px;padding:4px 14px;border-radius:20px;font-weight:500;margin-bottom:12px}
  .hero h1{font-size:28px;font-weight:700;margin-bottom:6px}
  .hero p{font-size:15px;color:var(--text-muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;max-width:780px;width:100%}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-decoration:none;color:var(--text);transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
  .card:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(15,110,86,.08)}
  .card .icon{width:40px;height:40px;background:var(--teal-light);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:4px}
  .card h2{font-size:16px;font-weight:600}
  .card p{font-size:13px;color:var(--text-muted);line-height:1.5}
  .card .arrow{font-size:13px;color:var(--teal);font-weight:500;margin-top:4px}
  .footer{margin-top:2rem;font-size:12px;color:var(--text-muted);text-align:center}
</style>
</head>
<body>
  <div class="hero">
    <span class="badge">MGHBIO 大鬍子藥師</span>
    <h1>漢方南向工具包</h1>
    <p>演講配套工具｜點選進入各頁面</p>
  </div>

  <div class="grid">
    <a class="card" href="lead-form.html">
      <div class="icon">📋</div>
      <h2>南向健檢申請表</h2>
      <p>演講現場 QR Code 導向頁面，填寫後資料自動送入 Google Sheet。</p>
      <span class="arrow">申請健檢 →</span>
    </a>
    <a class="card" href="checklist.html">
      <div class="icon">✅</div>
      <h2>南向自評 Checklist</h2>
      <p>15 題即時評分，讓廠商自己發現準備缺口。可列印為 PDF 現場發放。</p>
      <span class="arrow">開始自評 →</span>
    </a>
    <a class="card" href="cta-email.html">
      <div class="icon">📝</div>
      <h2>話術 & Email 模板</h2>
      <p>演講結尾 CTA 三段話術，及依市場分支的 24 小時 Follow-up Email。</p>
      <span class="arrow">查看模板 →</span>
    </a>
  </div>

  <div class="footer">漢方南向顧問事業｜MGHBIO DR.BU Lab</div>
</body>
</html>
